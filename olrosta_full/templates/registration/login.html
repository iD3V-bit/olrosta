{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow-lg border-0 p-4" style="border-radius: 15px;">
                <h2 class="text-center mb-4 fw-bold">Prisijungti</h2>
                
                {% if form.errors %}
                    <div class="alert alert-danger font-sm">
                        Neteisingas vartotojo vardas arba slaptažodis.
                    </div>
                {% endif %}

                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label small text-uppercase fw-bold text-muted">Vartotojo vardas</label>
                        <input type="text" name="username" autofocus maxlength="150" required id="id_username" class="form-control form-control-lg bg-light border-0">
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label small text-uppercase fw-bold text-muted">Slaptažodis</label>
                        <input type="password" name="password" required id="id_password" class="form-control form-control-lg bg-light border-0">
                    </div>

                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-dark btn-lg py-3 shadow-sm">Prisijungti</button>
                    </div>
                </form>
                
                <div class="text-center mt-4">
                    <p class="text-muted small">Neturite paskyros? 
                        <a href="{% url 'register' %}" class="text-dark fw-bold text-decoration-none border-bottom border-dark">Registruotis</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
